<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes — Proxy</title>
  <meta name="description" content="Premium curated notes for IPU students.">
  <link rel="stylesheet" href="../css/design-system.css?v=3">
  <style>
    /* Hide mobile menu overlay on desktop viewports */
    @media (min-width: 769px) {
      .mobile-menu-overlay {
        display: none !important;
      }
    }

    .notes-hero {
      padding: calc(var(--navbar-height) + var(--space-4xl)) 0 var(--space-3xl);
      text-align: center;
    }
    .notes-hero h1 {
      font-size: var(--font-size-5xl);
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: var(--space-md);
    }
    .notes-hero p {
      font-size: var(--font-size-lg);
      color: var(--text-secondary);
      max-width: 580px;
      margin: 0 auto;
    }
    
    .notes-filter-bar {
      max-width: 1300px;
      margin: 0 auto var(--space-4xl);
      padding: 0 6%;
      display: flex;
      gap: var(--space-md);
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .filter-btn {
      padding: 0.6rem 1.2rem;
      border-radius: 20px;
      border: 1px solid rgba(0,0,0,0.06);
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      font-family: inherit;
      font-size: var(--font-size-sm);
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .filter-btn:hover {
      background: rgba(124, 58, 237, 0.04);
      color: var(--text-primary);
    }
    
    .filter-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2);
    }

    /* Toast animation styles */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes slideUp {
      from { transform: translateY(50px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes slideDown {
      from { transform: translateY(0); opacity: 1; }
      to { transform: translateY(50px); opacity: 0; }
    }

    /* Mobile */
    @media (max-width: 768px) {
      .notes-hero {
        padding: calc(var(--navbar-height) + var(--space-3xl)) 1.25rem var(--space-2xl);
      }

      .notes-filter-bar {
        padding: 0 1.25rem;
        margin-bottom: var(--space-3xl);
        justify-content: flex-start;
        gap: 0.5rem;
        overflow-x: auto;
        flex-wrap: nowrap;
        scrollbar-width: none;
      }

      .notes-filter-bar::-webkit-scrollbar { display: none; }

      .filter-btn {
        white-space: nowrap;
        flex-shrink: 0;
      }
    }
  </style>
</head>
<body class="light-mode">
  <div class="page-content">
    <div class="notes-hero">
      <h1>Premium <span class="gradient-text">Notes</span></h1>
      <p>Your ultimate repository for high-quality, beautifully formatted notes tailored for IPU syllabus.</p>
    </div>
    
    <div class="notes-filter-bar">
      <!-- Dynamic Filter Buttons Populated via JS -->
      <button class="filter-btn active">All Subjects</button>
    </div>

    <!-- Notes Shelf Dynamic View -->
    <div class="notes-shelf-container" style="max-width: 1300px; margin-bottom: var(--space-5xl);">
      <!-- Shelves and Notebooks will be populated dynamically -->
    </div>
  </div>

  <script src="../js/shared.js?v=4"></script>
  <script src="../js/syllabus-engine.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      ProxyUI.injectNavbar('Notes');
      ProxyUI.injectBackgroundGlows();

      // Read query parameters or fall back to localStorage
      const urlParams = new URLSearchParams(window.location.search);
      const branch = urlParams.get('branch') || localStorage.getItem('selectedBranch') || 'CSE';
      const sem = parseInt(urlParams.get('sem') || localStorage.getItem('selectedSem') || '1');
      const targetSubjectCode = urlParams.get('subject');

      // Update Sub-heading description
      const heroSub = document.querySelector('.notes-hero p');
      if (heroSub) {
        heroSub.innerHTML = `Curated premium notes for GGSIPU <strong>${branch}</strong> Branch, <strong>Semester ${sem}</strong>. Click any notebook to download.`;
      }

      // Fetch subjects data from shared database
      const data = getSyllabusData(branch, sem);
      if (!data) return;

      const filterBar = document.querySelector('.notes-filter-bar');
      const shelfContainer = document.querySelector('.notes-shelf-container');

      if (filterBar && shelfContainer) {
        // Clear static placeholder filters
        filterBar.innerHTML = '';
        shelfContainer.innerHTML = '';

        // Add "All Subjects" button
        const allBtn = document.createElement('button');
        allBtn.className = `filter-btn ${!targetSubjectCode ? 'active' : ''}`;
        allBtn.innerText = 'All Subjects';
        allBtn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          allBtn.classList.add('active');
          renderShelf(data.subjects);
        });
        filterBar.appendChild(allBtn);

        // Add specific subject buttons
        data.subjects.forEach(subject => {
          const subBtn = document.createElement('button');
          subBtn.className = `filter-btn ${targetSubjectCode === subject.code ? 'active' : ''}`;
          subBtn.innerText = subject.title;
          subBtn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            subBtn.classList.add('active');
            renderShelf([subject]);
          });
          filterBar.appendChild(subBtn);
        });

        // Initialize Shelf Render based on query params
        if (targetSubjectCode) {
          const selectedSub = data.subjects.find(s => s.code === targetSubjectCode);
          if (selectedSub) {
            renderShelf([selectedSub]);
          } else {
            renderShelf(data.subjects);
          }
        } else {
          renderShelf(data.subjects);
        }
      }

      function renderShelf(subjects) {
        shelfContainer.innerHTML = '';

        // Group subjects in rows of 2 subjects
        const subjectsPerRow = 2;
        const colors = ['purple', 'blue', 'teal', 'rose'];

        for (let i = 0; i < subjects.length; i += subjectsPerRow) {
          const rowSubjects = subjects.slice(i, i + subjectsPerRow);
          const rowDiv = document.createElement('div');
          rowDiv.className = 'shelf-row';
          if (i > 0) rowDiv.style.marginTop = '4rem';

          rowSubjects.forEach((sub, subIdx) => {
            const color = colors[(i + subIdx) % colors.length];

            // Render 4 units as separate notebooks
            sub.units.forEach((unit, unitIdx) => {
              // Alternating heights and rotations for a realistic "shelf" feel
              const heights = [250, 225, 245, 235];
              const height = heights[unitIdx % heights.length];
              const rotation = (unitIdx % 2 === 0) ? `rotate(${-unitIdx - 2}deg)` : `rotate(${unitIdx + 2}deg)`;

              const notebook = document.createElement('div');
              notebook.className = `notebook notebook--${color}`;
              notebook.style.height = `${height}px`;
              notebook.style.transform = rotation;
              notebook.style.transformOrigin = 'bottom center';

              notebook.innerHTML = `
                <div class="notebook-spine">
                  <span class="spine-badge">${unit.num}</span>
                  <span class="spine-title">${sub.title}</span>
                  <span class="spine-code">${sub.code}</span>
                </div>
              `;

              // Click to show premium toast and trigger download
              notebook.addEventListener('click', () => {
                showDownloadAnimation(sub.title, unit.num, unit.topics);
              });

              rowDiv.appendChild(notebook);
            });

            // Add spacer between different subjects on the shelf
            if (subIdx < rowSubjects.length - 1) {
              const spacer = document.createElement('div');
              spacer.style.flexGrow = '1';
              rowDiv.appendChild(spacer);
            }
          });

          shelfContainer.appendChild(rowDiv);
        }
      }

      function showDownloadAnimation(subjectTitle, unitNum, topics) {
        // Remove existing toast if present
        const oldToast = document.getElementById('pdfToast');
        if (oldToast) oldToast.remove();

        const toast = document.createElement('div');
        toast.id = 'pdfToast';
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.right = '30px';
        toast.style.background = 'var(--card-bg)';
        toast.style.border = '1px solid var(--accent)';
        toast.style.borderRadius = '16px';
        toast.style.padding = '1.5rem 2rem';
        toast.style.boxShadow = '0 20px 40px rgba(0,0,0,0.35)';
        toast.style.zIndex = '1000';
        toast.style.display = 'flex';
        toast.style.flexDirection = 'column';
        toast.style.gap = '0.5rem';
        toast.style.maxWidth = '380px';
        toast.style.backdropFilter = 'blur(12px)';
        toast.style.animation = 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)';

        toast.innerHTML = `
          <div style="display:flex; align-items:center; gap: 0.75rem;">
            <div style="width:18px; height:18px; border:2px solid var(--accent); border-top-color:transparent; border-radius:50%; animation:spin 0.8s linear infinite;"></div>
            <strong style="color:var(--text-primary); font-size:1rem;">Preparing PDF Download...</strong>
          </div>
          <span style="color:var(--text-secondary); font-size:0.85rem; font-weight:600;">${subjectTitle} — ${unitNum}</span>
          <span style="color:var(--text-muted); font-size:0.75rem; display:block; margin-top:0.25rem;">Topics: ${topics.substring(0, 80)}...</span>
        `;

        document.body.appendChild(toast);

        // Simulate file compilation and download completion
        setTimeout(() => {
          toast.innerHTML = `
            <div style="display:flex; align-items:center; gap: 0.75rem;">
              <span style="color:#10b981; font-weight:bold; font-size:1.2rem;">✓</span>
              <strong style="color:var(--text-primary); font-size:1rem;">Download Started!</strong>
            </div>
            <span style="color:var(--text-secondary); font-size:0.85rem;">Saved file: ${subjectTitle.replace(/\s+/g, '_')}_${unitNum.replace(/\s+/g, '')}.pdf</span>
          `;
          setTimeout(() => {
            toast.style.animation = 'slideDown 0.4s ease forwards';
            setTimeout(() => toast.remove(), 400);
          }, 3500);
        }, 1800);
      }
    });
  </script>
</body>
</html>
