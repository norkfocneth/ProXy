<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Tree — Proxy</title>
  <meta name="description" content="Interactive career tree for IPU students. Choose your path and grow organically.">
  <link rel="stylesheet" href="../css/design-system.css?v=3">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    /* ── Hide mobile menu on desktop ── */
    @media (min-width: 769px) { .mobile-menu-overlay { display: none !important; } }

    /* ── Reset & Override Body ── */
    body, body.light-mode {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif !important;
      background: #f6f8f3 !important;
      color: #1a2e1a !important;
      overflow: hidden !important;
      height: 100vh !important;
      -webkit-font-smoothing: antialiased;
    }

    .page-content { display: none !important; }

    /* ── CSS Variables ── */
    :root {
      --g50: #f0fdf4; --g100: #dcfce7; --g200: #bbf7d0; --g300: #86efac;
      --g400: #4ade80; --g500: #22c55e; --g600: #16a34a; --g700: #15803d;
      --g800: #166534; --g900: #14532d;
      --txt: #1a2e1a; --txt2: #4a6a4a; --txt3: #7a9a7a;
      --card: rgba(255,255,255,0.78); --card-b: rgba(21,128,61,0.06);
      --sh-s: 0 2px 8px rgba(20,83,45,0.04), 0 1px 3px rgba(20,83,45,0.06);
      --sh-m: 0 4px 16px rgba(20,83,45,0.06), 0 2px 6px rgba(20,83,45,0.04);
      --sh-l: 0 12px 40px rgba(20,83,45,0.08), 0 4px 12px rgba(20,83,45,0.04);
      --sh-p: 0 20px 60px rgba(20,83,45,0.12), 0 8px 20px rgba(20,83,45,0.06);
      --r-s: 10px; --r-m: 14px; --r-l: 20px; --r-xl: 24px;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ── Ambient Background ── */
    .tree-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: linear-gradient(165deg, #f6f8f3 0%, #eef5e8 40%, #f2f7ee 100%);
    }
    .tree-bg::before {
      content: ''; position: absolute; top: -15%; left: -10%; width: 65%; height: 65%;
      background: radial-gradient(circle, rgba(187,247,208,0.22) 0%, transparent 70%);
      filter: blur(80px);
    }
    .tree-bg::after {
      content: ''; position: absolute; bottom: -8%; right: -5%; width: 45%; height: 45%;
      background: radial-gradient(circle, rgba(134,239,172,0.1) 0%, transparent 60%);
      filter: blur(90px);
    }

    /* Floating spores */
    .spore {
      position: fixed; border-radius: 50%; pointer-events: none; z-index: 1;
      animation: sporeFloat linear infinite;
    }
    @keyframes sporeFloat {
      0% { transform: translateY(105vh) rotate(0deg) scale(0.8); opacity: 0; }
      8% { opacity: 0.35; }
      92% { opacity: 0.25; }
      100% { transform: translateY(-8vh) rotate(360deg) scale(1.1); opacity: 0; }
    }

    /* ── Layout: Sidebar + Canvas ── */
    .tree-layout {
      position: fixed; inset: 0; top: var(--navbar-height, 64px);
      display: grid; grid-template-columns: 260px 1fr;
      z-index: 2;
    }

    /* ── Sidebar ── */
    .tree-sidebar {
      background: rgba(255,255,255,0.52);
      backdrop-filter: blur(24px) saturate(1.5);
      border-right: 1px solid rgba(21,128,61,0.05);
      padding: 1.75rem 1.15rem;
      display: flex; flex-direction: column; gap: 0.4rem;
      overflow-y: auto;
    }
    .tree-sidebar::-webkit-scrollbar { width: 3px; }
    .tree-sidebar::-webkit-scrollbar-thumb { background: rgba(21,128,61,0.1); border-radius: 3px; }

    .sb-hd { margin-bottom: 1.5rem; padding: 0 0.2rem; }
    .sb-hd h1 { font-size: 1.5rem; font-weight: 900; letter-spacing: -0.03em; color: var(--txt); }
    .sb-hd h1 span { font-weight: 400; color: var(--txt2); }
    .sb-hd p { font-size: 0.78rem; color: var(--txt3); margin-top: 0.3rem; font-weight: 500; }

    .sb-list { display: flex; flex-direction: column; gap: 0.3rem; flex: 1; }

    .sb-btn {
      display: flex; align-items: center; gap: 0.8rem;
      padding: 0.78rem 0.9rem; border: 1.5px solid transparent;
      border-radius: var(--r-m); background: transparent; cursor: pointer;
      font-family: inherit; text-align: left;
      transition: all 0.3s var(--ease); position: relative;
    }
    .sb-btn:hover { background: rgba(22,163,74,0.03); border-color: rgba(21,128,61,0.06); }
    .sb-btn.active {
      background: var(--g50); border-color: rgba(21,128,61,0.12);
      box-shadow: var(--sh-s);
    }

    .sb-ico {
      width: 40px; height: 40px; border-radius: var(--r-s);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem; flex-shrink: 0; background: var(--g100);
      transition: all 0.3s ease;
    }
    .sb-btn.active .sb-ico {
      background: var(--g700); box-shadow: 0 4px 12px rgba(21,128,61,0.2);
    }

    .sb-txt h3 { font-size: 0.85rem; font-weight: 700; color: var(--txt); line-height: 1.2; }
    .sb-txt p { font-size: 0.7rem; color: var(--txt3); font-weight: 500; margin-top: 1px; }

    .sb-chev {
      margin-left: auto; width: 16px; height: 16px; color: var(--txt3);
      opacity: 0; transition: opacity 0.2s ease;
    }
    .sb-btn:hover .sb-chev, .sb-btn.active .sb-chev { opacity: 1; color: var(--g600); }

    /* Zoom Controls */
    .sb-zoom {
      margin-top: auto; padding-top: 1rem;
      border-top: 1px solid rgba(21,128,61,0.05);
      display: flex; align-items: center; gap: 0.4rem;
    }
    .z-btn {
      width: 30px; height: 30px; border-radius: 8px;
      border: 1px solid rgba(21,128,61,0.08); background: white;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 0.85rem; color: var(--txt2);
      font-family: inherit; font-weight: 700;
      transition: all 0.2s ease;
    }
    .z-btn:hover { border-color: var(--g400); color: var(--g700); }
    .z-lbl { font-size: 0.75rem; font-weight: 600; color: var(--txt3); min-width: 38px; text-align: center; }

    /* ── Canvas Area ── */
    .tree-canvas { position: relative; overflow: hidden; cursor: grab; background: transparent; }
    .tree-canvas:active { cursor: grabbing; }

    .canvas-world {
      position: absolute; width: 4000px; height: 3000px;
      transform-origin: 0 0;
    }

    /* ── SVG Lines ── */
    .tree-svg {
      position: absolute; inset: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 1;
    }
    .vine {
      fill: none; stroke: var(--g200); stroke-width: 2.5; stroke-linecap: round;
    }
    .vine.a { stroke: var(--g300); stroke-width: 2.8; filter: drop-shadow(0 0 3px rgba(34,197,94,0.1)); }
    .vsub { fill: none; stroke: var(--g200); stroke-width: 2; stroke-linecap: round; }
    .vsub.a { stroke: var(--g300); stroke-width: 2.2; }
    .vleaf { fill: none; stroke: rgba(21,128,61,0.08); stroke-width: 1.5; stroke-linecap: round; stroke-dasharray: 5 4; }
    .vleaf.a { stroke: var(--g200); stroke-dasharray: none; stroke-width: 1.8; }
    .vp { fill: var(--g400); opacity: 0.5; }

    /* ── Tree Nodes ── */
    .nd { position: absolute; z-index: 5; cursor: pointer; }

    /* Root Hub */
    .nd-root {
      width: 150px; height: 150px; border-radius: 50%;
      background: linear-gradient(145deg, var(--g700) 0%, var(--g800) 100%);
      border: 3px solid var(--g600);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      box-shadow: 0 0 0 7px rgba(22,163,74,0.07), 0 0 0 18px rgba(22,163,74,0.025), var(--sh-l);
      text-align: center; color: white;
      animation: hubPulse 4.5s ease-in-out infinite;
      transform: translate(-50%, -50%);
    }
    @keyframes hubPulse {
      0%, 100% { box-shadow: 0 0 0 7px rgba(22,163,74,0.07), 0 0 0 18px rgba(22,163,74,0.025), var(--sh-l); }
      50% { box-shadow: 0 0 0 10px rgba(22,163,74,0.1), 0 0 0 24px rgba(22,163,74,0.04), var(--sh-l); }
    }
    .nd-root .ri { font-size: 2rem; margin-bottom: 0.2rem; }
    .nd-root h2 { font-size: 0.82rem; font-weight: 800; letter-spacing: -0.01em; line-height: 1.2; }

    /* Category Cards */
    .nd-cat {
      background: var(--card); backdrop-filter: blur(20px) saturate(1.6);
      border: 1.5px solid var(--card-b); border-radius: var(--r-l);
      padding: 0.9rem 1.15rem; display: flex; align-items: center; gap: 0.7rem;
      box-shadow: var(--sh-s); min-width: 205px;
      transition: all 0.3s var(--ease); user-select: none;
      transform: translate(-50%, -50%);
    }
    .nd-cat:hover { border-color: rgba(21,128,61,0.16); box-shadow: var(--sh-m); }
    .nd-cat.open { border-color: rgba(21,128,61,0.25); box-shadow: var(--sh-m), 0 0 18px rgba(34,197,94,0.05); background: rgba(255,255,255,0.9); }

    .ci {
      width: 36px; height: 36px; border-radius: var(--r-s);
      background: var(--g100); display: flex; align-items: center; justify-content: center;
      font-size: 1.05rem; flex-shrink: 0;
    }
    .nd-cat.open .ci { background: var(--g600); box-shadow: 0 3px 10px rgba(21,128,61,0.2); }

    .ct h4 { font-size: 0.8rem; font-weight: 700; color: var(--txt); line-height: 1.2; }
    .ct p { font-size: 0.68rem; color: var(--txt3); font-weight: 500; margin-top: 1px; }

    .cc {
      margin-left: auto; width: 14px; height: 14px; color: var(--txt3);
      transition: transform 0.3s var(--spring), color 0.3s ease;
    }
    .nd-cat.open .cc { color: var(--g600); transform: rotate(90deg); }

    /* Leaf Nodes */
    .nd-leaf {
      background: var(--card); backdrop-filter: blur(16px) saturate(1.4);
      border: 1.5px solid rgba(21,128,61,0.05); border-radius: var(--r-m);
      padding: 0.65rem 1rem; display: flex; align-items: center; gap: 0.55rem;
      box-shadow: var(--sh-s); min-width: 165px;
      transition: all 0.3s var(--ease); user-select: none;
      animation: leafGrow 0.45s var(--spring) forwards;
      opacity: 0; transform: translate(-50%, -50%) scale(0.85);
    }
    @keyframes leafGrow { to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }

    .nd-leaf:hover { border-color: rgba(21,128,61,0.16); box-shadow: var(--sh-m); }
    .nd-leaf.sel { border-color: var(--g500); background: rgba(240,253,244,0.92); }

    .ld { width: 7px; height: 7px; border-radius: 50%; background: var(--g300); flex-shrink: 0; }
    .nd-leaf.sel .ld { background: var(--g500); box-shadow: 0 0 6px rgba(34,197,94,0.3); }
    .nd-leaf span { font-size: 0.76rem; font-weight: 600; color: var(--txt); }
    .lc { margin-left: auto; color: var(--txt3); opacity: 0; transition: opacity 0.2s; width: 12px; height: 12px; }
    .nd-leaf:hover .lc { opacity: 1; }

    /* ── Detail Panel ── */
    .dtl-panel {
      position: fixed; top: var(--navbar-height, 64px); right: 0;
      width: 400px; height: calc(100vh - var(--navbar-height, 64px));
      background: rgba(255,255,255,0.85); backdrop-filter: blur(32px) saturate(1.8);
      border-left: 1px solid rgba(21,128,61,0.05);
      box-shadow: var(--sh-p); z-index: 50;
      transform: translateX(100%); transition: transform 0.45s var(--ease);
      overflow-y: auto; overflow-x: hidden;
    }
    .dtl-panel.open { transform: translateX(0); }
    .dtl-panel::-webkit-scrollbar { width: 3px; }
    .dtl-panel::-webkit-scrollbar-thumb { background: rgba(21,128,61,0.1); border-radius: 3px; }

    .p-close {
      position: absolute; top: 1.1rem; right: 1.1rem;
      width: 30px; height: 30px; border-radius: 50%;
      background: rgba(0,0,0,0.04); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 0.9rem; color: var(--txt2);
      transition: all 0.2s ease; z-index: 5;
    }
    .p-close:hover { background: rgba(0,0,0,0.08); color: var(--txt); }

    .p-hero {
      background: linear-gradient(145deg, var(--g700), var(--g800));
      padding: 2.2rem 1.75rem 1.8rem; color: white; position: relative; overflow: hidden;
    }
    .p-hero::after {
      content: ''; position: absolute; top: -25%; right: -15%;
      width: 180px; height: 180px;
      background: radial-gradient(circle, rgba(255,255,255,0.07) 0%, transparent 70%);
      border-radius: 50%;
    }
    .p-hero h3 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.3rem; position: relative; z-index: 2; }
    .p-hero p { font-size: 0.78rem; opacity: 0.8; font-weight: 500; position: relative; z-index: 2; line-height: 1.5; }

    /* Video Card */
    .p-video {
      margin: 1.35rem 1.5rem 0; border-radius: var(--r-m); overflow: hidden;
      position: relative; aspect-ratio: 16/9;
      background: linear-gradient(135deg, var(--g800), var(--g900));
      box-shadow: var(--sh-m);
    }
    .p-video-inner {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    }
    .p-video-placeholder { text-align: center; color: rgba(255,255,255,0.35); }
    .p-video-placeholder .vp-icon { font-size: 1.8rem; margin-bottom: 0.3rem; }
    .p-video-placeholder .vp-text { font-size: 0.7rem; font-weight: 600; }

    .play-btn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(255,255,255,0.88); backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 18px rgba(0,0,0,0.12); cursor: pointer;
    }
    .play-btn::after {
      content: ''; width: 0; height: 0;
      border-left: 12px solid var(--g700); border-top: 8px solid transparent; border-bottom: 8px solid transparent;
      margin-left: 2px;
    }

    .vid-cap {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 2rem 0.9rem 0.7rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.6));
      color: white; font-size: 0.72rem; font-weight: 600;
      display: flex; justify-content: space-between; align-items: flex-end;
    }
    .vid-dur { font-size: 0.65rem; background: rgba(0,0,0,0.3); padding: 2px 5px; border-radius: 3px; font-weight: 600; }

    /* Content Section */
    .p-content { padding: 1.5rem 1.5rem 2rem; }
    .p-stitle { font-size: 0.9rem; font-weight: 800; color: var(--txt); margin-bottom: 0.8rem; letter-spacing: -0.01em; }

    .spec {
      display: flex; align-items: flex-start; gap: 0.7rem;
      padding: 0.6rem 0; border-bottom: 1px solid rgba(21,128,61,0.03);
    }
    .spec:last-child { border-bottom: none; }
    .spec-i { width: 22px; text-align: center; font-size: 0.8rem; flex-shrink: 0; margin-top: 1px; }
    .spec-l { font-size: 0.78rem; font-weight: 700; color: var(--txt); min-width: 72px; }
    .spec-v { font-size: 0.78rem; color: var(--txt2); font-weight: 500; }

    .p-sub { font-size: 0.82rem; font-weight: 800; color: var(--txt); margin: 1.5rem 0 0.4rem; }
    .p-text { font-size: 0.75rem; color: var(--txt2); line-height: 1.6; font-weight: 500; }

    .tip-box {
      margin-top: 1.25rem; background: var(--g50);
      border: 1px solid rgba(21,128,61,0.06); border-radius: var(--r-m);
      padding: 0.9rem 1.1rem; display: flex; gap: 0.7rem;
    }
    .tip-ico {
      width: 26px; height: 26px; border-radius: 50%; background: var(--g200);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; flex-shrink: 0;
    }
    .tip-box h5 { font-size: 0.78rem; font-weight: 700; color: var(--txt); margin-bottom: 1px; }
    .tip-box p { font-size: 0.72rem; color: var(--txt2); line-height: 1.45; font-weight: 500; }

    /* Botanical deco */
    .botan {
      position: fixed; bottom: 0; left: 260px; right: 0; height: 90px;
      pointer-events: none; z-index: 3;
      background: linear-gradient(transparent, rgba(240,253,244,0.2));
      display: flex; align-items: flex-end; justify-content: center; gap: 2.5rem;
      padding-bottom: 0.4rem; opacity: 0.45;
    }
    .bf { filter: blur(0.8px) saturate(0.6); opacity: 0.35; }
    .bf:nth-child(1) { font-size: 2.2rem; transform: rotate(-12deg); }
    .bf:nth-child(2) { font-size: 1.8rem; transform: rotate(22deg); opacity: 0.25; }
    .bf:nth-child(3) { font-size: 2.5rem; transform: rotate(-5deg); opacity: 0.2; }
  </style>
</head>
<body class="light-mode">

  <div class="tree-bg"></div>

  <!-- Layout -->
  <div class="tree-layout">
    <!-- Sidebar -->
    <div class="tree-sidebar">
      <div class="sb-hd">
        <h1>Career <span>Roadmaps</span></h1>
        <p>Choose a path. Master your future.</p>
      </div>
      <div class="sb-list" id="sbList"></div>
      <div class="sb-zoom">
        <button class="z-btn" onclick="zoom(-0.1)">−</button>
        <span class="z-lbl" id="zLbl">100%</span>
        <button class="z-btn" onclick="zoom(0.1)">+</button>
        <button class="z-btn" onclick="resetPan()" style="margin-left:auto; font-size:0.65rem;">⟳</button>
      </div>
    </div>

    <!-- Canvas -->
    <div class="tree-canvas" id="treeCanvas">
      <div class="canvas-world" id="world">
        <svg class="tree-svg" id="svg"></svg>
      </div>
    </div>
  </div>

  <!-- Detail Panel -->
  <div class="dtl-panel" id="dtlPanel">
    <button class="p-close" onclick="closePanel()">✕</button>
    <div id="panelBody"></div>
  </div>

  <!-- Botanical -->
  <div class="botan"><span class="bf">🌿</span><span class="bf">🍃</span><span class="bf">🌱</span></div>

  <!-- Spore particles -->
  <script>
    for (let i = 0; i < 10; i++) {
      const s = document.createElement('div');
      s.className = 'spore';
      const sz = 2 + Math.random() * 3;
      Object.assign(s.style, {
        width: sz+'px', height: sz+'px', left: Math.random()*100+'%',
        background: `rgba(${34+Math.random()*30},${175+Math.random()*50},${80+Math.random()*30},${0.12+Math.random()*0.12})`,
        animationDuration: (20+Math.random()*18)+'s', animationDelay: (Math.random()*12)+'s'
      });
      document.body.appendChild(s);
    }
  </script>

  <script src="../js/shared.js?v=3"></script>

      },
      cyber: {
        icon:"🔒", title:"Cyber Security", desc:"Protect systems, networks and digital assets.",
        cats: [
          { id:"cy-req", icon:"📋", title:"1. Requirements", desc:"Security lab setup.", kids:[
            { id:"cy-hw", label:"Lab Setup", panel:"cyHw" },

      uiux: {
        icon:"🎨", title:"UI/UX Design", desc:"Design beautiful and user-friendly products.",
        cats: [
          { id:"ux-req", icon:"📋", title:"1. Requirements", desc:"Design tools setup.", kids:[
            { id:"ux-tools", label:"Figma & Adobe XD", panel:"uxTools" },
            { id:"ux-hw", label:"Display & Tablet", panel:"uxHw" }
          ]},
          { id:"ux-learn", icon:"📚", title:"2. Learning Path", desc:"Design principles.", kids:[
            { id:"ux-fund", label:"Design Fundamentals", panel:"uxFund" },
            { id:"ux-proto", label:"Prototyping", panel:"uxProto" },

            { id:"ux-pd", label:"Product Designer", panel:"uxPd" },
            { id:"ux-free", label:"Freelance Designer", panel:"uxFree" }

    };

    // Panel Content Database
    const PANELS = {
      deviceReq: {
        title: "Device Requirements", desc: "Find the perfect device setup for web development.",
        videoTitle: "How to choose the right laptop\nfor web development", videoDur: "8:42",
        specs: [
          { i:"💻", l:"CPU", v:"Intel i5 / Ryzen 5 or higher" },
          { i:"🧠", l:"RAM", v:"8 GB (16 GB recommended)" },
          { i:"💾", l:"Storage", v:"512 GB SSD minimum" },
          { i:"🎮", l:"GPU", v:"Integrated graphics (dedicated GPU optional)" },
          { i:"🖥", l:"Display", v:'13" or larger, FHD+ resolution' },
          { i:"🔋", l:"Battery", v:"6+ hours backup" }
        ],
        why: "These specifications ensure smooth performance while running code editors, browsers, emulators and other development tools without any lag.",
        tip: "SSD and 16GB RAM will future-proof your setup and boost productivity significantly."
      },
      softReq: {
        title: "Software Requirements", desc: "Essential software and tools for web dev.",
        specs: [
          { i:"📝", l:"Editor", v:"VS Code with extensions" },
          { i:"🌐", l:"Browser", v:"Chrome or Firefox Developer Edition" },
          { i:"⚙", l:"Runtime", v:"Node.js LTS + npm" },
          { i:"🗃", l:"VCS", v:"Git + GitHub Desktop" },
          { i:"📦", l:"Package Mgr", v:"npm / yarn / pnpm" }
        ],
        why: "These tools form the foundation of any web developer's workflow.",
        tip: "Install VS Code extensions: ESLint, Prettier, Live Server, GitLens."
      },
      knowReq: {
        title: "Knowledge Requirements", desc: "Core concepts to know before starting.",
        specs: [
          { i:"🔤", l:"Typing", v:"40+ WPM touch typing recommended" },
          { i:"🧮", l:"Logic", v:"Basic logic and problem-solving skills" },
          { i:"🌍", l:"English", v:"Comfortable reading English documentation" }
        ],
        why: "Strong foundational skills accelerate your learning curve tremendously.",
        tip: "Practice typing on keybr.com and solve puzzles on HackerRank for logic."
      },
      frontend: {
        title: "Frontend Development", desc: "Build beautiful user interfaces.",
        specs: [
          { i:"1️⃣", l:"HTML5", v:"Semantic elements, forms, accessibility" },
          { i:"2️⃣", l:"CSS3", v:"Flexbox, Grid, animations, responsive" },
          { i:"3️⃣", l:"JavaScript", v:"ES6+, DOM, events, async/await" },
          { i:"4️⃣", l:"React", v:"Components, hooks, state, routing" },
          { i:"5️⃣", l:"TypeScript", v:"Type safety for large projects" }
        ],
        why: "Frontend is the visible layer of web — the part users directly interact with.",
        tip: "Build 3 personal projects before applying for your first frontend role."
      },
      backend: {
        title: "Backend Development", desc: "Server-side logic and APIs.",
        specs: [
          { i:"1️⃣", l:"Node.js", v:"JavaScript runtime for servers" },
          { i:"2️⃣", l:"Express", v:"Web framework for REST APIs" },
          { i:"3️⃣", l:"Auth", v:"JWT, OAuth, session management" },
          { i:"4️⃣", l:"Testing", v:"Jest, Mocha, API testing" }
        ],
        why: "Backend handles data processing, authentication, and business logic.",
        tip: "Learn REST APIs before moving to GraphQL."
      }
    };

    function getPanel(k) {
      if (PANELS[k]) return PANELS[k];
      const pretty = k.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
      return {
        title: pretty, desc: "Detailed information and learning resources.",
        specs: [{ i:"📌", l:"Status", v:"Premium content coming soon" }, { i:"📚", l:"Resources", v:"Curated materials in progress" }],
        why: "This section is being prepared with high-quality content by our team.",
        tip: "Stay tuned — detailed guides, videos and recommendations are on the way."
      };
    }

    // State
    let career = 'web';
    let openCats = {};
    let selLeaf = null;
    let sc = 1, px = 0, py = 0;
    let drag = false, lm = {x:0,y:0};

    const HUB = { x: 550, y: 550 };

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof ProxyUI !== 'undefined') {
        ProxyUI.injectNavbar('Roadmaps');
        ProxyUI.injectBackgroundGlows();
      }
      buildSidebar();
      renderTree();
      setupPanZoom();
      resetPan();
    });

    function buildSidebar() {
      const c = document.getElementById('sbList');
      c.innerHTML = '';
      const chev = '<svg class="sb-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
      for (const k in DB) {
        const d = DB[k];
        const b = document.createElement('button');
        b.className = 'sb-btn' + (k===career?' active':'');
        b.innerHTML = `<div class="sb-ico">${d.icon}</div><div class="sb-txt"><h3>${d.title}</h3><p>${d.desc}</p></div>${chev}`;
        b.onclick = () => { career=k; openCats={}; selLeaf=null; closePanel(); buildSidebar(); renderTree(); };
        c.appendChild(b);
      }
    }

    function renderTree() {
      const w = document.getElementById('world');
      const svg = document.getElementById('svg');
      w.querySelectorAll('.nd').forEach(n=>n.remove());
      svg.innerHTML = '';
      const d = DB[career]; if(!d) return;

      // Root
      mk(w, HUB.x, HUB.y, `<div class="nd-root"><div class="ri">${d.icon}</div><h2>${d.title}</h2></div>`);

      // Layout categories vertically on the right side of root
      const catCount = d.cats.length;
      const catSpacingY = 110;
      const catStartY = HUB.y - ((catCount-1)*catSpacingY)/2;
      const catX = HUB.x + 340;

      d.cats.forEach((cat, i) => {
        const cy = catStartY + i * catSpacingY;
        const isOpen = !!openCats[cat.id];

        // Vine: root -> category
        vine(svg, HUB.x+75, HUB.y, catX-105, cy, isOpen ? 'a' : '');

        mk(w, catX, cy, `
          <div class="nd-cat ${isOpen?'open':''}" onclick="toggleCat('${cat.id}')">
            <div class="ci">${cat.icon}</div>
            <div class="ct"><h4>${cat.title}</h4><p>${cat.desc}</p></div>
            <svg class="cc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
          </div>
        `);

        // Children
        if (isOpen && cat.kids) {
          const kidX = catX + 300;
          const kidSpacing = 48;
          const kidStartY = cy - ((cat.kids.length-1)*kidSpacing)/2;

          cat.kids.forEach((kid, ki) => {
            const ky = kidStartY + ki * kidSpacing;
            const isSel = selLeaf === kid.id;

            // Sub-vine: category -> leaf
            vine(svg, catX+105, cy, kidX-85, ky, 'a', true);

            mk(w, kidX, ky, `
              <div class="nd-leaf ${isSel?'sel':''}" onclick="openPanel('${kid.id}','${kid.panel}')" style="animation-delay:${ki*0.06}s">
                <div class="ld"></div>
                <span>${kid.label}</span>
                <svg class="lc" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
              </div>
            `);
          });
        }
      });
    }

    function mk(container, x, y, html) {
      const el = document.createElement('div');
      el.className = 'nd';
      el.style.left = x+'px'; el.style.top = y+'px';
      el.innerHTML = html;
      container.appendChild(el);
    }

    function vine(svg, x1, y1, x2, y2, cls, isSub) {
      const mx = (x1+x2)/2;
      const dd = `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`;
      const p = ns('path');
      p.setAttribute('d', dd);
      p.setAttribute('class', (isSub ? 'vsub' : 'vine') + (cls ? ' ' + cls : ''));
      svg.appendChild(p);

      // Particle
      if (cls) {
        const c = ns('circle');
        c.setAttribute('r', isSub ? '2.2' : '3');
        c.setAttribute('class', 'vp');
        const a = ns('animateMotion');
        a.setAttribute('dur', isSub ? '2.5s' : '3.8s');
        a.setAttribute('repeatCount', 'indefinite');
        a.setAttribute('path', dd);
        c.appendChild(a);
        svg.appendChild(c);
      }
    }

    function ns(tag) { return document.createElementNS('http://www.w3.org/2000/svg', tag); }

    function toggleCat(id) {
      openCats[id] = !openCats[id];
      selLeaf = null; closePanel(); renderTree();
    }

    function openPanel(leafId, panelKey) {
      selLeaf = leafId; renderTree();
      const d = getPanel(panelKey);
      const body = document.getElementById('panelBody');

      let specs = d.specs ? d.specs.map(s =>
        `<div class="spec"><span class="spec-i">${s.i}</span><span class="spec-l">${s.l}</span><span class="spec-v">: ${s.v}</span></div>`
      ).join('') : '';

      body.innerHTML = `
        <div class="p-hero"><h3>${d.title}</h3><p>${d.desc}</p></div>
        ${d.videoTitle ? `
        <div class="p-video">
          <div class="p-video-inner"><div class="p-video-placeholder"><div class="vp-icon">🎬</div><div class="vp-text">Video Preview</div></div></div>
          <div class="play-btn"></div>
          <div class="vid-cap"><span>${d.videoTitle}</span><span class="vid-dur">${d.videoDur}</span></div>
        </div>` : ''}
        <div class="p-content">
          <h4 class="p-stitle">Recommended Specs</h4>
          ${specs}
          ${d.why ? `<h4 class="p-sub">Why these specs?</h4><p class="p-text">${d.why}</p>` : ''}
          ${d.tip ? `
          <div class="tip-box">
            <div class="tip-ico">💡</div>
            <div><h5>Pro Tip</h5><p>${d.tip}</p></div>
          </div>` : ''}
        </div>
      `;
      document.getElementById('dtlPanel').classList.add('open');
    }

    function closePanel() { document.getElementById('dtlPanel').classList.remove('open'); selLeaf=null; }

    // Pan & Zoom
    function setupPanZoom() {
      const c = document.getElementById('treeCanvas');
      c.addEventListener('mousedown', e => {
        if (e.target.closest('.nd')) return;
        drag = true; lm = {x:e.clientX, y:e.clientY}; c.style.cursor='grabbing';
      });
      window.addEventListener('mousemove', e => {
        if (!drag) return;
        px += e.clientX - lm.x; py += e.clientY - lm.y;
        lm = {x:e.clientX, y:e.clientY}; applyTx();
      });
      window.addEventListener('mouseup', () => { drag=false; document.getElementById('treeCanvas').style.cursor='grab'; });
      c.addEventListener('wheel', e => { e.preventDefault(); zoom(e.deltaY>0?-0.08:0.08); }, {passive:false});
    }

    function zoom(d) {
      sc = Math.max(0.3, Math.min(2, sc+d));
      document.getElementById('zLbl').textContent = Math.round(sc*100)+'%';
      applyTx();
    }

    function applyTx() {
      document.getElementById('world').style.transform = `translate(${px}px,${py}px) scale(${sc})`;
    }

    function resetPan() {
      sc = 0.95; px = -180; py = -160;
      document.getElementById('zLbl').textContent = Math.round(sc*100)+'%';
      applyTx();
    }
  </script>
