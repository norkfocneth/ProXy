<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Career Tree — Proxy</title>
  <meta name="description" content="Interactive career tree for IPU students. Choose your path and grow organically.">
  <link rel="stylesheet" href="../css/design-system.css?v=3">
  <style>
    @media (min-width: 769px) { .mobile-menu-overlay { display: none !important; } }
    body, body.light-mode {
      font-family: var(--font-family-sans) !important;
      background: #f4f7f0 !important; color: #1a2e1a !important;
      overflow: hidden !important; height: 100vh !important;
      -webkit-font-smoothing: antialiased;
    }
    .page-content { display: none !important; }
    :root {
      --g50:#f0fdf4;--g100:#dcfce7;--g200:#bbf7d0;--g300:#86efac;
      --g400:#4ade80;--g500:#22c55e;--g600:#16a34a;--g700:#15803d;--g800:#166534;--g900:#14532d;
      --txt:#1a2e1a;--txt2:#3d5c3d;--txt3:#6b8f6b;
      --card:rgba(255,255,255,0.82);--card-b:rgba(21,128,61,0.07);
      --sh-s:0 2px 8px rgba(20,83,45,0.05),0 1px 3px rgba(20,83,45,0.07);
      --sh-m:0 4px 16px rgba(20,83,45,0.07),0 2px 6px rgba(20,83,45,0.05);
      --sh-l:0 12px 40px rgba(20,83,45,0.09),0 4px 12px rgba(20,83,45,0.05);
      --sh-p:0 20px 60px rgba(20,83,45,0.13),0 8px 20px rgba(20,83,45,0.07);
      --r-s:10px;--r-m:14px;--r-l:20px;--r-xl:24px;
      --ease:cubic-bezier(0.16,1,0.3,1);--spring:cubic-bezier(0.34,1.56,0.64,1);
    }

    /* ── BG ── */
    .tree-bg{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:linear-gradient(165deg,#f4f7f0 0%,#eaf2e2 45%,#f0f6ea 100%);}
    .tree-bg::before{content:'';position:absolute;top:-18%;left:-12%;width:68%;height:68%;
      background:radial-gradient(circle,rgba(187,247,208,.20) 0%,transparent 70%);filter:blur(90px);}
    .tree-bg::after{content:'';position:absolute;bottom:-10%;right:-8%;width:48%;height:48%;
      background:radial-gradient(circle,rgba(134,239,172,.09) 0%,transparent 60%);filter:blur(100px);}
    .spore{position:fixed;border-radius:50%;pointer-events:none;z-index:1;animation:sporeFloat linear infinite;}
    @keyframes sporeFloat{0%{transform:translateY(105vh) rotate(0deg);opacity:0}8%{opacity:.3}92%{opacity:.2}100%{transform:translateY(-8vh) rotate(360deg);opacity:0}}

    /* ── Layout ── */
    .tree-layout{position:fixed;inset:0;top:var(--navbar-height,64px);display:grid;grid-template-columns:270px 1fr;z-index:2;}

    /* ── Sidebar ── */
    .tree-sidebar{background:rgba(255,255,255,.55);backdrop-filter:blur(26px) saturate(1.5);
      border-right:1px solid rgba(21,128,61,.06);padding:1.6rem 1.1rem;
      display:flex;flex-direction:column;gap:.35rem;overflow-y:auto;}
    .tree-sidebar::-webkit-scrollbar{width:3px}
    .tree-sidebar::-webkit-scrollbar-thumb{background:rgba(21,128,61,.1);border-radius:3px}
    .sb-hd{margin-bottom:1.4rem;padding:0 .2rem}
    .sb-hd h1{font-size:1.45rem;font-weight:900;letter-spacing:-.03em;color:var(--txt)}
    .sb-hd h1 span{font-weight:400;color:var(--txt3)}
    .sb-hd p{font-size:.75rem;color:var(--txt3);margin-top:.25rem;font-weight:500}
    .sb-list{display:flex;flex-direction:column;gap:.28rem;flex:1}
    .sb-btn{display:flex;align-items:center;gap:.75rem;padding:.72rem .85rem;
      border:1.5px solid transparent;border-radius:var(--r-m);background:transparent;
      cursor:pointer;font-family:inherit;text-align:left;transition:all .3s var(--ease);position:relative}
    .sb-btn:hover{background:rgba(22,163,74,.03);border-color:rgba(21,128,61,.06)}
    .sb-btn.active{background:var(--g50);border-color:rgba(21,128,61,.13);box-shadow:var(--sh-s)}
    .sb-ico{width:38px;height:38px;border-radius:var(--r-s);display:flex;align-items:center;
      justify-content:center;font-size:1.2rem;flex-shrink:0;background:var(--g100);transition:all .3s ease}
    .sb-btn.active .sb-ico{background:var(--g700);box-shadow:0 4px 12px rgba(21,128,61,.22)}
    .sb-txt h3{font-size:.83rem;font-weight:700;color:var(--txt);line-height:1.2}
    .sb-txt p{font-size:.68rem;color:var(--txt3);font-weight:500;margin-top:1px}
    .sb-chev{margin-left:auto;width:15px;height:15px;color:var(--txt3);opacity:0;transition:opacity .2s}
    .sb-btn:hover .sb-chev,.sb-btn.active .sb-chev{opacity:1;color:var(--g600)}
    .sb-zoom{margin-top:auto;padding-top:.9rem;border-top:1px solid rgba(21,128,61,.05);
      display:flex;align-items:center;gap:.4rem}
    .z-btn{width:28px;height:28px;border-radius:7px;border:1px solid rgba(21,128,61,.09);background:white;
      display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.82rem;
      color:var(--txt2);font-family:inherit;font-weight:700;transition:all .2s ease}
    .z-btn:hover{border-color:var(--g400);color:var(--g700)}
    .z-lbl{font-size:.72rem;font-weight:600;color:var(--txt3);min-width:36px;text-align:center}

    /* ── Canvas ── */
    .tree-canvas{position:relative;overflow:hidden;cursor:grab;background:transparent}
    .tree-canvas:active{cursor:grabbing}
    .canvas-world{position:absolute;width:5000px;height:3400px;transform-origin:0 0}
    .tree-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1}
    .vine{fill:none;stroke:var(--g200);stroke-width:2.6;stroke-linecap:round}
    .vine.a{stroke:var(--g300);stroke-width:3;filter:drop-shadow(0 0 3px rgba(34,197,94,.12))}
    .vsub{fill:none;stroke:var(--g200);stroke-width:2;stroke-linecap:round}
    .vsub.a{stroke:var(--g300);stroke-width:2.3}
    .vp{fill:var(--g400);opacity:.55}

    /* ── Nodes ── */
    .nd{position:absolute;z-index:5;cursor:pointer}

    /* ── Hyper-Realistic Leaf Root ── */
    .nd-root{
      width:170px;height:195px;display:flex;flex-direction:column;align-items:center;justify-content:center;
      transform:translate(-50%,-50%);position:relative;animation:leafSway 6s ease-in-out infinite;
    }
    @keyframes leafSway{
      0%,100%{transform:translate(-50%,-50%) rotate(-1.5deg)}
      50%{transform:translate(-50%,-50%) rotate(1.5deg)}
    }
    .leaf-svg{position:absolute;inset:0;width:100%;height:100%;z-index:0;filter:drop-shadow(0 8px 20px rgba(21,128,61,.18)) drop-shadow(0 2px 6px rgba(21,128,61,.25));}
    .leaf-content{position:relative;z-index:2;text-align:center;display:flex;flex-direction:column;align-items:center;gap:.2rem;margin-top:-8px;}
    .leaf-ico{font-size:1.7rem;filter:drop-shadow(0 1px 2px rgba(0,0,0,.2))}
    .leaf-title{font-size:.86rem;font-weight:800;color:white;letter-spacing:-.01em;line-height:1.2;text-shadow:0 1px 3px rgba(0,0,0,.25)}
    .leaf-vein{position:absolute;inset:0;z-index:1;opacity:.18;pointer-events:none}

    /* ── Category Cards ── */
    .nd-cat{background:var(--card);backdrop-filter:blur(22px) saturate(1.6);
      border:1.5px solid var(--card-b);border-radius:var(--r-l);
      padding:.85rem 1.1rem;display:flex;align-items:center;gap:.65rem;
      box-shadow:var(--sh-s);min-width:208px;transition:all .3s var(--ease);
      user-select:none;transform:translate(-50%,-50%)}
    .nd-cat:hover{border-color:rgba(21,128,61,.18);box-shadow:var(--sh-m)}
    .nd-cat.open{border-color:rgba(21,128,61,.28);box-shadow:var(--sh-m),0 0 18px rgba(34,197,94,.06);background:rgba(255,255,255,.92)}
    .ci{width:34px;height:34px;border-radius:var(--r-s);background:var(--g100);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
    .nd-cat.open .ci{background:var(--g600);box-shadow:0 3px 10px rgba(21,128,61,.22)}
    .ct h4{font-size:.88rem;font-weight:700;color:var(--txt);line-height:1.2}
    .ct p{font-size:.74rem;color:var(--txt3);font-weight:500;margin-top:2px}
    .cc{margin-left:auto;width:13px;height:13px;color:var(--txt3);transition:transform .3s var(--spring),color .3s ease}
    .nd-cat.open .cc{color:var(--g600);transform:rotate(90deg)}

    /* ── Leaf Nodes ── */
    .nd-leaf{background:var(--card);backdrop-filter:blur(18px) saturate(1.4);
      border:1.5px solid rgba(21,128,61,.06);border-radius:var(--r-m);
      padding:.6rem .95rem;display:flex;align-items:center;gap:.5rem;
      box-shadow:var(--sh-s);min-width:168px;transition:all .3s var(--ease);
      user-select:none;animation:leafGrow .4s var(--spring) forwards;
      opacity:0;transform:translate(-50%,-50%) scale(.85)}
    @keyframes leafGrow{to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
    .nd-leaf:hover{border-color:rgba(21,128,61,.18);box-shadow:var(--sh-m)}
    .nd-leaf.sel{border-color:var(--g500);background:rgba(240,253,244,.95)}
    .ld{width:7px;height:7px;border-radius:50%;background:var(--g300);flex-shrink:0}
    .nd-leaf.sel .ld{background:var(--g500);box-shadow:0 0 6px rgba(34,197,94,.35)}
    .nd-leaf span{font-size:.84rem;font-weight:600;color:var(--txt)}
    .lc{margin-left:auto;color:var(--txt3);opacity:0;transition:opacity .2s;width:12px;height:12px}
    .nd-leaf:hover .lc{opacity:1}

    /* ── Detail Panel ── */
    .dtl-panel{position:fixed;top:var(--navbar-height,64px);right:0;
      width:420px;height:calc(100vh - var(--navbar-height,64px));
      background:rgba(255,255,255,.88);backdrop-filter:blur(34px) saturate(1.9);
      border-left:1px solid rgba(21,128,61,.06);
      box-shadow:var(--sh-p);z-index:50;
      transform:translateX(100%);transition:transform .45s var(--ease);
      overflow-y:auto;overflow-x:hidden}
    .dtl-panel.open{transform:translateX(0)}
    .dtl-panel::-webkit-scrollbar{width:3px}
    .dtl-panel::-webkit-scrollbar-thumb{background:rgba(21,128,61,.1);border-radius:3px}
    .p-close{position:absolute;top:1rem;right:1rem;width:28px;height:28px;border-radius:50%;
      background:rgba(0,0,0,.04);border:none;display:flex;align-items:center;justify-content:center;
      cursor:pointer;font-size:.88rem;color:var(--txt2);transition:all .2s ease;z-index:5}
    .p-close:hover{background:rgba(0,0,0,.09);color:var(--txt)}
    .p-hero{background:linear-gradient(145deg,var(--g700),var(--g800));
      padding:2rem 1.6rem 1.6rem;color:white;position:relative;overflow:hidden}
    .p-hero::after{content:'';position:absolute;top:-30%;right:-18%;width:190px;height:190px;
      background:radial-gradient(circle,rgba(255,255,255,.07) 0%,transparent 70%);border-radius:50%}
    .p-hero h3{font-size:1.2rem;font-weight:800;letter-spacing:-.02em;margin-bottom:.25rem;position:relative;z-index:2}
    .p-hero p{font-size:.76rem;opacity:.8;font-weight:500;position:relative;z-index:2;line-height:1.5}
    .p-hero .sal-badge{display:inline-flex;align-items:center;gap:.4rem;margin-top:.7rem;
      background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);
      border-radius:20px;padding:.25rem .75rem;font-size:.7rem;font-weight:700;position:relative;z-index:2}

    /* Video */
    .p-video{margin:1.2rem 1.4rem 0;border-radius:var(--r-m);overflow:hidden;
      position:relative;aspect-ratio:16/9;background:linear-gradient(135deg,var(--g800),var(--g900));box-shadow:var(--sh-m)}
    .p-video-inner{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
    .p-video-ph{text-align:center;color:rgba(255,255,255,.3)}
    .p-video-ph .vi{font-size:1.6rem;margin-bottom:.2rem}
    .p-video-ph .vt{font-size:.68rem;font-weight:600}
    .play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.88);
      backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 18px rgba(0,0,0,.14);cursor:pointer}
    .play-btn::after{content:'';width:0;height:0;
      border-left:11px solid var(--g700);border-top:7px solid transparent;border-bottom:7px solid transparent;margin-left:2px}
    .vid-cap{position:absolute;bottom:0;left:0;right:0;padding:1.8rem .85rem .65rem;
      background:linear-gradient(transparent,rgba(0,0,0,.6));color:white;font-size:.7rem;
      font-weight:600;display:flex;justify-content:space-between;align-items:flex-end}
    .vid-dur{font-size:.63rem;background:rgba(0,0,0,.35);padding:2px 5px;border-radius:3px;font-weight:700}

    /* Content */
    .p-content{padding:1.4rem 1.5rem 2.5rem}
    .p-stitle{font-size:.88rem;font-weight:800;color:var(--txt);margin-bottom:.75rem;letter-spacing:-.01em}
    .spec{display:flex;align-items:flex-start;gap:.65rem;padding:.55rem 0;border-bottom:1px solid rgba(21,128,61,.03)}
    .spec:last-child{border-bottom:none}
    .spec-i{width:20px;text-align:center;font-size:.78rem;flex-shrink:0;margin-top:1px}
    .spec-l{font-size:.76rem;font-weight:700;color:var(--txt);min-width:70px}
    .spec-v{font-size:.76rem;color:var(--txt2);font-weight:500}
    .p-sub{font-size:.8rem;font-weight:800;color:var(--txt);margin:1.3rem 0 .4rem}
    .p-text{font-size:.74rem;color:var(--txt2);line-height:1.65;font-weight:500}
    .p-steps{display:flex;flex-direction:column;gap:.45rem;margin-top:.25rem}
    .step{display:flex;gap:.6rem;align-items:flex-start}
    .step-n{width:20px;height:20px;border-radius:50%;background:var(--g600);color:white;
      font-size:.65rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:.05rem}
    .step span{font-size:.74rem;color:var(--txt2);font-weight:500;line-height:1.5}
    .sal-table{width:100%;border-collapse:collapse;font-size:.73rem;margin-top:.4rem}
    .sal-table th{background:var(--g50);color:var(--g800);font-weight:700;padding:.45rem .6rem;text-align:left;font-size:.7rem}
    .sal-table td{padding:.42rem .6rem;border-bottom:1px solid rgba(21,128,61,.04);color:var(--txt2)}
    .sal-table tr:last-child td{border:none}
    .tag-row{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.35rem}
    .tag{display:inline-block;padding:.22rem .6rem;border-radius:20px;font-size:.67rem;font-weight:600;
      background:var(--g100);color:var(--g800);border:1px solid rgba(21,128,61,.08)}
    .tip-box{margin-top:1.2rem;background:var(--g50);border:1px solid rgba(21,128,61,.07);
      border-radius:var(--r-m);padding:.85rem 1rem;display:flex;gap:.65rem}
    .tip-ico{width:24px;height:24px;border-radius:50%;background:var(--g200);
      display:flex;align-items:center;justify-content:center;font-size:.72rem;flex-shrink:0}
    .tip-box h5{font-size:.76rem;font-weight:700;color:var(--txt);margin-bottom:2px}
    .tip-box p{font-size:.71rem;color:var(--txt2);line-height:1.5;font-weight:500}

    /* Botanical */
    .botan{position:fixed;bottom:0;left:270px;right:0;height:80px;pointer-events:none;z-index:3;
      display:flex;align-items:flex-end;justify-content:center;gap:2.5rem;padding-bottom:.3rem;opacity:.35}
    .bf{filter:blur(.8px) saturate(.5);opacity:.3}
    .bf:nth-child(1){font-size:2rem;transform:rotate(-12deg)}
    .bf:nth-child(2){font-size:1.7rem;transform:rotate(22deg);opacity:.2}
    .bf:nth-child(3){font-size:2.3rem;transform:rotate(-5deg);opacity:.18}

    /* Mobile adjustments for roadmaps */
    @media (max-width: 768px) {
      .tree-layout {
        grid-template-columns: 1fr;
      }
      .tree-sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: 280px;
        height: 100vh;
        z-index: 1000;
        transform: translateX(-100%);
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        border-right: 1px solid rgba(21,128,61,.1);
        box-shadow: var(--sh-l);
        background: rgba(255, 255, 255, 0.98);
      }
      .tree-sidebar.open {
        transform: translateX(0);
      }
      .sidebar-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.3);
        z-index: 999;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
      }
      .sidebar-overlay.active {
        opacity: 1;
        visibility: visible;
      }
      .mobile-menu-trigger {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        background: var(--g700);
        color: white;
        border: none;
        border-radius: 30px;
        padding: 0.8rem 1.6rem;
        font-size: 0.82rem;
        font-weight: 700;
        box-shadow: 0 8px 24px rgba(21,128,61,0.3);
        cursor: pointer;
        z-index: 100;
        transition: transform 0.2s, background 0.2s;
      }
      .mobile-menu-trigger:active {
        transform: translate(-50%, 2px) scale(0.97);
        background: var(--g800);
      }
      .dtl-panel {
        width: 100%;
        height: 75vh;
        top: auto;
        bottom: 0;
        right: 0;
        left: 0;
        border-left: none;
        border-top: 1px solid rgba(21,128,61,.1);
        border-top-left-radius: 24px;
        border-top-right-radius: 24px;
        transform: translateY(100%);
        transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 1005;
        background: rgba(255, 255, 255, 0.97);
        overflow-y: auto !important;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }
      .dtl-panel.open {
        transform: translateY(0);
      }
      .panel-drag-handle {
        width: 40px;
        height: 5px;
        background: rgba(0,0,0,0.12);
        border-radius: 3px;
        margin: 0.8rem auto 0;
        flex-shrink: 0;
      }
      .p-close {
        top: 0.8rem;
        right: 0.8rem;
      }
      .botan {
        left: 0;
      }
    }
  </style>
</head>
<body class="light-mode">
  <div class="tree-bg"></div>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleMobileSidebar()"></div>
  <button class="mobile-menu-trigger font-mono-tech" id="mobileMenuTrigger" onclick="toggleMobileSidebar()">🗺️ Choose Path</button>

  <div class="tree-layout">
    <div class="tree-sidebar">
      <div class="sb-hd">
        <h1>Career <span>Roadmaps</span></h1>
        <p>Choose a path. Master your future.</p>
      </div>
      <div class="sb-list" id="sbList"></div>
      <div class="sb-zoom">
        <button class="z-btn" onclick="zoom(-0.1)">−</button>
        <span class="z-lbl" id="zLbl">95%</span>
        <button class="z-btn" onclick="zoom(0.1)">+</button>
        <button class="z-btn" onclick="resetPan()" style="margin-left:auto;font-size:.62rem">⟳</button>
      </div>
    </div>
    <div class="tree-canvas" id="treeCanvas">
      <div class="canvas-world" id="world">
        <svg class="tree-svg" id="svg"></svg>
      </div>
    </div>
  </div>

  <div class="dtl-panel" id="dtlPanel">
    <div class="panel-drag-handle"></div>
    <button class="p-close" onclick="closePanel()">✕</button>
    <div id="panelBody"></div>
  </div>

  <div class="botan"><span class="bf">🌿</span><span class="bf">🍃</span><span class="bf">🌱</span></div>

  <script>
    for(let i=0;i<10;i++){
      const s=document.createElement('div');s.className='spore';
      const sz=2+Math.random()*3;
      Object.assign(s.style,{width:sz+'px',height:sz+'px',left:Math.random()*100+'%',
        background:`rgba(${34+Math.random()*30|0},${170+Math.random()*50|0},${80+Math.random()*30|0},${.1+Math.random()*.12})`,
        animationDuration:(22+Math.random()*16)+'s',animationDelay:(Math.random()*14)+'s'});
      document.body.appendChild(s);
    }
  </script>

  <script src="../js/shared.js?v=3"></script>
  <script>
  /* ══════════════════════════════════════════════
     CAREER TREE ENGINE v3 — Full Content Edition
  ══════════════════════════════════════════════ */

  /* ── CAREER DATABASE ── */
  const DB = {
    web:{icon:'🌐',title:'Web Development',desc:'Build websites and web applications.',
      cats:[
        {id:'w-req',icon:'💻',title:'1. Requirements',desc:'Everything you need to get started.',kids:[
          {id:'w-dev-req',label:'Device Requirements',panel:'wDevReq'},
          {id:'w-soft-req',label:'Software & Tools',panel:'wSoftReq'},
          {id:'w-know-req',label:'Pre-Skills Needed',panel:'wKnowReq'}]},
        {id:'w-learn',icon:'📚',title:'2. Learning Path',desc:'Step-by-step mastery roadmap.',kids:[
          {id:'w-front',label:'Frontend Development',panel:'wFront'},
          {id:'w-back',label:'Backend Development',panel:'wBack'},

  function mk(container,x,y,html){

  function vine(svg,x1,y1,x2,y2,cls,isSub){
    const mx=(x1+x2)/2;
    const dd=`M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`;
    const p=ns('path');p.setAttribute('d',dd);p.setAttribute('class',(isSub?'vsub':'vine')+(cls?' '+cls:''));svg.appendChild(p);
    if(cls){
      const c=ns('circle');c.setAttribute('r',isSub?'2.2':'3');c.setAttribute('class','vp');
      const a=ns('animateMotion');a.setAttribute('dur',isSub?'2.6s':'4s');a.setAttribute('repeatCount','indefinite');a.setAttribute('path',dd);
      c.appendChild(a);svg.appendChild(c);
    }
  }

  function smoothPanTo(targetPx, targetPy) {
    const startPx = px;

    const duration = 400; // ms
    const startTime = performance.now();
    
    function anim(now) {
      const elapsed = now - startTime;
      const progress = Math.min(1, elapsed / duration);
      const ease = 1 - Math.pow(1 - progress, 3); // easeOutCubic
      
      px = startPx + (targetPx - startPx) * ease;
      py = startPy + (targetPy - startPy) * ease;
      applyTx();
      
      if (progress < 1) {
        requestAnimationFrame(anim);
      }
    }
    requestAnimationFrame(anim);
  }

  function toggleCat(id){
    openCats[id]=!openCats[id];
    selLeaf=null;
    closePanel();
    renderTree();
    
    // Auto-pan and scale on category click
    if (window.innerWidth <= 768) {
      const isOpen = openCats[id];
      const pos = activePositions.find(p => p.cat.id === id);
      if (pos) {
        // Zoom out slightly to fit children, zoom in when collapsing
        sc = isOpen ? Math.min(0.7, (window.innerWidth - 24) / 980) : Math.max(0.48, (window.innerWidth - 24) / 780);
        document.getElementById('zLbl').textContent = Math.round(sc * 100) + '%';
        
        const targetX = isOpen ? HUB.x + 440 : HUB.x + 140;
        const targetY = pos.catY;
        
        const targetPx = (window.innerWidth / 2) - (targetX * sc);
        const targetPy = (window.innerHeight * 0.3) - (targetY * sc); // Center in top third of screen
        
        smoothPanTo(targetPx, targetPy);
      }
    } else {
      const pos = activePositions.find(p => p.cat.id === id);
      if (pos) {
        const targetPx = (window.innerWidth * 0.45) - (HUB.x * sc);
        const targetPy = (window.innerHeight * 0.5) - (pos.catY * sc);
        smoothPanTo(targetPx, targetPy);
      }
    }
  }

  function openPanel(leafId,panelKey){
    selLeaf=leafId;
    renderTree();
    const d=getPanel(panelKey);
    document.getElementById('panelBody').innerHTML=buildPanel(d);
    document.getElementById('dtlPanel').classList.add('open');
    
    // Smooth pan to focus on the selected leaf node
    let leafY = HUB.y;
    for (const p of activePositions) {
      if (p.isOpen && p.cat.kids) {
        const kidIndex = p.cat.kids.findIndex(k => k.id === leafId);
        if (kidIndex !== -1) {
          const kidSpacing = 60;
          const kidStartY = p.catY - ((p.K - 1) * kidSpacing) / 2;
          leafY = kidStartY + kidIndex * kidSpacing;
          break;
        }
      }
    }
    
    const kidX = HUB.x + 600;
    if (window.innerWidth <= 768) {
      const targetPx = (window.innerWidth / 2) - (kidX * sc);
      const targetPy = (window.innerHeight * 0.22) - (leafY * sc); // Center in top 22% of screen
      smoothPanTo(targetPx, targetPy);
    } else {
      const targetPx = (window.innerWidth * 0.35) - (kidX * sc); // Shift left to make room for details panel
      const targetPy = (window.innerHeight * 0.5) - (leafY * sc);
      smoothPanTo(targetPx, targetPy);
    }
  }

  function buildPanel(d){
    let specs='';
    if(d.specs){specs=d.specs.map(s=>`<div class="spec"><span class="spec-i">${s.i}</span><span class="spec-l">${s.l}</span><span class="spec-v font-mono-tech">: ${s.v}</span></div>`).join('');}
    let steps='';
    if(d.steps){steps=`<div class="p-steps">`+d.steps.map((s,i)=>`<div class="step"><div class="step-n font-mono-tech">${i+1}</div><span>${s}</span></div>`).join('')+`</div>`;}
    let salTable='';
    if(d.salaryData){
      salTable=`<table class="sal-table"><thead><tr><th>Experience Level</th><th>Package (LPA)</th></tr></thead><tbody>`+
        d.salaryData.map(r=>`<tr><td>${r.level}</td><td><strong class="font-mono-tech">${r.range}</strong></td></tr>`).join('')+`</tbody></table>`;
    }
    const video=d.videoTitle?`
      <div class="p-video">
        <div class="p-video-inner"><div class="p-video-ph"><div class="vi">🎬</div><div class="vt">Video Guide</div></div></div>
        <div class="play-btn"></div>
        <div class="vid-cap"><span>${d.videoTitle}</span><span class="vid-dur font-mono-tech">${d.videoDur}</span></div>
      </div>`:'';
    return `
      <div class="p-hero">
        <h3>${d.title}</h3>
        <p>${d.desc}</p>
        ${d.salary?`<div class="sal-badge font-mono-tech">💰 ${d.salary}</div>`:''}
      </div>
      ${video}
      <div class="p-content">
        ${specs?`<h4 class="p-stitle">${d.salaryData?'Salary Breakdown':d.steps?'Step-by-Step Guide':'Recommended Specs'}</h4>${specs||steps||salTable}`:
          steps?`<h4 class="p-stitle">Learning Steps</h4>${steps}`:
          salTable?`<h4 class="p-stitle">Salary Breakdown</h4>${salTable}`:''}
        ${!specs&&steps?'':steps&&!specs?'':specs&&!steps&&!salTable?'':
          d.salaryData&&!specs?`<h4 class="p-stitle">Salary Breakdown</h4>${salTable}`:''}
        ${d.why?`<h4 class="p-sub">Why This Matters</h4><p class="p-text">${d.why}</p>`:''}
        ${d.tip?`<div class="tip-box"><div class="tip-ico">💡</div><div><h5>Pro Tip</h5><p class="font-serif-italic">${d.tip}</p></div></div>`:''}
      </div>`;
  }

  function closePanel(){document.getElementById('dtlPanel').classList.remove('open');selLeaf=null;}

  function setupPanZoom(){
    const c=document.getElementById('treeCanvas');
    // Mouse dragging
    c.addEventListener('mousedown',e=>{if(e.target.closest('.nd'))return;drag=true;lm={x:e.clientX,y:e.clientY};c.style.cursor='grabbing';});
    window.addEventListener('mousemove',e=>{if(!drag)return;px+=e.clientX-lm.x;py+=e.clientY-lm.y;lm={x:e.clientX,y:e.clientY};applyTx();});
    window.addEventListener('mouseup',()=>{drag=false;document.getElementById('treeCanvas').style.cursor='grab';});
    
    // Touch dragging (Mobile)
    c.addEventListener('touchstart',e=>{
      if(e.target.closest('.nd'))return;
      if(e.touches.length === 1){
        drag=true;
        lm={x:e.touches[0].clientX,y:e.touches[0].clientY};
      }
    },{passive:true});
    window.addEventListener('touchmove',e=>{
      if(!drag || e.touches.length !== 1) return;
      px+=e.touches[0].clientX-lm.x;
      py+=e.touches[0].clientY-lm.y;
      lm={x:e.touches[0].clientX,y:e.touches[0].clientY};
      applyTx();
    },{passive:true});
    window.addEventListener('touchend',()=>{drag=false;});
    
    c.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY>0?-0.08:0.08);},{passive:false});
  }
  function zoom(d){sc=Math.max(0.25,Math.min(2.2,sc+d));document.getElementById('zLbl').textContent=Math.round(sc*100)+'%';applyTx();}
  function applyTx(){document.getElementById('world').style.transform=`translate(${px}px,${py}px) scale(${sc})`;}
  function resetPan(){sc=0.95;px=-160;py=-140;document.getElementById('zLbl').textContent=Math.round(sc*100)+'%';applyTx();}
  </script>
</body>
</html>
